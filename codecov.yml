codecov:
  require_ci_to_pass: true
  precision: 2
  round: down
  layout: "reach,diff,flags,tree"
  branch: main

coverage:
  precision: 2
  round: down
  range: "70...100"

ignore:
  - "tests"
  - "**/*_test.py"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "node_modules"
  - ".venv"
  - "venv"
  - "build"
  - "dist"

flags:
  backend:
    paths:
      - backend
    carryforward: true
  frontend:
    paths:
      - frontend
    carryforward: true
  compiler:
    paths:
      - compiler
    carryforward: true

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

github:
  require_ci_to_pass: true

status:
  project:
    default:
      target: 85
      threshold: 5%
      base: auto
  patch:
    default:
      target: 80
      threshold: 5%
  changes:
    default:
      target: 80
      threshold: 5%
