name: Compiler CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'compiler/**'
      - '.github/workflows/compiler-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'compiler/**'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check code formatting
        run: |
          find compiler/src -name "*.cpp" -o -name "*.h" | xargs clang-format --dry-run -Werror

      - name: Run clang-tidy
        run: |
          cd compiler
          clang-tidy src/**/*.cpp -- -I./src -std=c++17

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem compiler/src/

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang]
        exclude:
          - os: macos-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang

    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build llvm-dev
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install cmake ninja llvm
          fi
        shell: bash

      - name: Configure CMake
        run: |
          cd compiler
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DENABLE_TESTING=ON \
            -DENABLE_COVERAGE=ON

      - name: Build compiler
        run: |
          cd compiler/build
          ninja -j$(nproc)

      - name: Run unit tests
        run: |
          cd compiler/build
          ctest --output-on-failure --verbose

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: |
          cd compiler/build
          ninja coverage
          bash <(curl -s https://codecov.io/bash) -f coverage.xml

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler (Release)
        run: |
          cd compiler
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run performance benchmarks
        run: |
          cd compiler/build
          ./benchmarks/compiler_benchmark --output=benchmark_results.json

      - name: Compare with baseline
        run: |
          python3 scripts/compare_benchmarks.py \
            benchmark_results.json \
            baseline_results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: compiler/build/benchmark_results.json

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Sonarqube scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Bandit security check
        run: |
          pip install bandit
          bandit -r compiler/src -f json -o bandit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: bandit-report.json

  integration-test:
    name: Integration Testing
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build all components
        run: |
          cd compiler && cmake -B build && cmake --build build
          cd ../backend && pip install -r requirements.txt
          cd ../frontend && npm install

      - name: Run integration tests
        run: |
          python3 tests/integration/test_compiler_backend_integration.py
          python3 tests/integration/test_backend_frontend_integration.py

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push compiler image
        uses: docker/build-push-action@v4
        with:
          context: ./compiler
          file: ./compiler/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/synq-compiler:latest
            ${{ secrets.DOCKER_USERNAME }}/synq-compiler:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/synq-compiler:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/synq-compiler:buildcache,mode=max

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [lint-and-format, build-and-test, security-scan]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Compiler CI/CD Pipeline: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Compiler CI/CD Pipeline*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                  }
                }
              ]
            }
