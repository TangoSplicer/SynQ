name: Compiler CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'compiler/**'
      - '.github/workflows/compiler-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'compiler/**'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check code formatting
        run: |
          find compiler/src -type f \( -name "*.cpp" -o -name "*.h" \) -exec clang-format --dry-run -Werror {} +

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem compiler/src/ || true

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Set up build environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Configure CMake
        run: |
          cd compiler
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}

      - name: Build compiler
        run: |
          cd compiler/build
          ninja -j$(nproc || sysctl -n hw.ncpu)

      - name: Run unit tests
        run: |
          cd compiler/build
          ctest --output-on-failure --verbose || true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install security tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          pip install bandit

      - name: Run cppcheck security checks
        run: |
          cppcheck --enable=security compiler/src/ || true

      - name: Run Bandit security check
        run: |
          bandit -r compiler/src -f json -o bandit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-compiler
          path: bandit-report.json
        if: always()

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build compiler image
        uses: docker/build-push-action@v5
        with:
          context: ./compiler
          file: ./compiler/Dockerfile
          push: false
          tags: synq-compiler:latest
        if: secrets.DOCKER_USERNAME == ''

      - name: Build and push compiler image
        uses: docker/build-push-action@v5
        with:
          context: ./compiler
          file: ./compiler/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/synq-compiler:latest
            ${{ secrets.DOCKER_USERNAME }}/synq-compiler:${{ github.sha }}
        if: secrets.DOCKER_USERNAME != ''

  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [lint-and-format, build-and-test, security-scan]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Compiler CI/CD Pipeline: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Compiler CI/CD Pipeline*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                  }
                }
              ]
            }
        if: secrets.SLACK_WEBHOOK != ''
